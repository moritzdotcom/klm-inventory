server {
    listen 80;
    server_name inventur.km-entertainment.de;
    charset utf-8;
    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://inventur.km-entertainment.de;
    }
}

server {
    listen 443 ssl;
    server_name inventur.km-entertainment.de;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/inventur.km-entertainment.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inventur.km-entertainment.de/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /socket.io/ {
        proxy_pass http://realtime:3001;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 75s;
    }

    location / {
        proxy_pass http://web:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}